; PlatformIO Project Configuration
; Seeed XIAO nRF52840 DFU updater host

[env:xiao_nrf52840]
platform = nordicnrf52
platform_packages =
  framework-arduinoadafruitnrf52 @ https://github.com/meshcore-dev/Adafruit_nRF52_Arduino#d541301
board = seeed-xiao-afruitnrf52-nrf52840
board_build.ldscript = boards/nrf52840_s140_v7.ld
framework = arduino
upload_protocol = nrfutil
monitor_speed = 115200
monitor_filters = direct
build_flags =
  -I variants/xiao_nrf52
  ; The Adafruit nRF52 BSP ships with nrfx QSPI disabled. Without this flag
  ; nrfx_qspi_init() is a no-op stub and every flash read returns 0xFF.
  -D NRFX_QSPI_ENABLED=1
build_src_filter =
  +<*>
  +<../variants/xiao_nrf52>
lib_deps =
  adafruit/Adafruit SPIFlash
  adafruit/SdFat - Adafruit Fork
  bblanchon/ArduinoJson @ ^7
