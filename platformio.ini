; PlatformIO Project Configuration
; Seeed XIAO nRF52840 DFU updater host
;
; Setup matches the known-working MeshCore project (see ~/Documents/MeshCore):
; upstream `nordicnrf52` platform, with the Adafruit nRF52 framework overridden
; to the MeshCore fork (BLE-stack patches). The board JSON in ./boards/ is set
; up for the factory Seeed bootloader's memory map, so no bootloader re-flash
; is needed.

[env:xiao_nrf52840]
platform = nordicnrf52
platform_packages =
  framework-arduinoadafruitnrf52 @ https://github.com/meshcore-dev/Adafruit_nRF52_Arduino#d541301
board = seeed-xiao-afruitnrf52-nrf52840
board_build.ldscript = boards/nrf52840_s140_v7.ld
framework = arduino

; --- Upload / monitor ---
upload_protocol = nrfutil
monitor_speed = 115200
monitor_filters = direct

; --- Variant ---
; The MeshCore Adafruit nRF52 fork doesn't ship a Seeed_XIAO_nRF52840 variant,
; so we provide our own (copied from MeshCore) and put it on the include path
; + the build source filter so variant.cpp is compiled.
build_flags =
  -I variants/xiao_nrf52
  ; The Adafruit nRF52 BSP ships with nrfx QSPI disabled. Without this flag
  ; nrfx_qspi_init() is a no-op stub and every flash read returns 0xFF.
  -D NRFX_QSPI_ENABLED=1
build_src_filter =
  +<*>
  +<../variants/xiao_nrf52>

; --- Libraries ---
; USE_TINYUSB / USBCON are added by the BSP's build script automatically.
; DO NOT add `adafruit/Adafruit TinyUSB Library` here — the BSP fork bundles
; its own copy and adding a second one causes the linker to pull mixed symbols,
; leaving USB enumeration silently broken.
lib_deps =
  adafruit/Adafruit SPIFlash
  adafruit/SdFat - Adafruit Fork
  bblanchon/ArduinoJson @ ^7
